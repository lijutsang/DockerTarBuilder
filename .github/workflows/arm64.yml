name: ARM64 Pull and Save Docker Image

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称 多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'  # 设置默认的 Docker 镜像列表

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Pull Docker Images and Package
      run: |
        set -euo pipefail

        pull_arm64_image() {
          local image="$1"
          local platform="linux/arm64"

          if docker pull --platform "$platform" "$image"; then
            return
          fi

          echo "::warning::${image} does not expose ${platform} in its manifest list; retrying without --platform and verifying image config."
          docker pull "$image"

          actual_platform="$(docker image inspect "$image" --format '{{.Os}}/{{.Architecture}}')"
          if [ "$actual_platform" != "$platform" ]; then
            echo "::error::Pulled ${image} as ${actual_platform}, expected ${platform}."
            exit 1
          fi
        }

        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        for image in "${image_array[@]}"; do
          pull_arm64_image "${image}"
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          docker save "${image}" -o "${image_name}-arm64.tar"
          gzip -c "${image_name}-arm64.tar" > "${image_name}-arm64.tar.gz"
          rm "${image_name}-arm64.tar"
        done

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: my-artifact
        path: ${{ github.workspace }}/*.tar.gz
        retention-days: 1  # 将保留天数设置为 1 天 最多可设置90天

